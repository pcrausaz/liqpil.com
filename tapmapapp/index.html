<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tap Map App - liqpil</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="canonical" href="https://liqpil.com/tapmapapp/">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="/"><img src="/assets/Liqpil-Logo.svg" alt="liqpil" class="logo"></a>
                <p class="tagline">Mobile Applications</p>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <a href="/" class="back-link">&larr; All apps</a>
            <div class="single-app">
                <div class="app-card">
                    <div class="app-header">
                        <img src="/assets/TapMapApp.png" alt="Tap Map App" class="app-icon">
                        <div class="app-info">
                            <h2>Tap Map App</h2>
                            <span class="app-status status-released">Released</span>
                        </div>
                    </div>
                    <p class="app-description">
                        Find affordable beer and discover local pubs with community-driven price sharing. Navigate to budget-friendly drinking spots and support local establishments while saving money on your nights out.
                    </p>
                    <div class="app-links">
                        <a href="https://apps.apple.com/us/app/tap-map-app/id6745830369" class="app-link link-badge" target="_blank" rel="noopener"><img src="/assets/app-store-badge.svg" alt="Download on the App Store"></a>
                        <!-- <a href="https://testflight.apple.com/join/1rDPxEhA" class="app-link link-beta" target="_blank" rel="noopener">TestFlight</a> -->
                        <a href="https://tapmapapp.org" class="app-link link-website" target="_blank" rel="noopener">Website</a>
                        <a href="https://status.tapmapapp.org/" class="app-link link-status" title="Service Status" target="_blank" rel="noopener"><img src="/assets/status-icon.png" alt="Status"></a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2024&ndash;2026 liqpil.com</p>
            </div>
        </div>
    </footer>
</body>
</html>
