<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting&hellip; - liqpil</title>
    <link rel="stylesheet" href="/styles.css">
    <script>
        (function () {
            var path = location.pathname.toLowerCase().replace(/\/+$/, '');
            var known = ['/tapmapapp', '/petcheckai', '/pagoda'];
            if (known.indexOf(path) !== -1) {
                location.replace(path + '/');
            }
        })();
    </script>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="/"><img src="/assets/Liqpil-Logo.svg" alt="liqpil" class="logo"></a>
                <p class="tagline">Mobile Applications</p>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="single-app" style="text-align: center;">
                <h2 style="color: #2c3e50; margin-bottom: 1rem;">Page not found</h2>
                <p style="color: #5a6c7d; margin-bottom: 2rem;">The page you are looking for does not exist.</p>
                <a href="/" class="app-link link-appstore">&larr; Back to all apps</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2024&ndash;2026 liqpil.com</p>
            </div>
        </div>
    </footer>
</body>
</html>
